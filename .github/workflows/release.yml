name: Aurelia Release

# Build release binaries for every target on a native runner (no cross-compiling)
# and attach them to a GitHub Release. Asset names follow RELEASE.md (the names
# Heroic's downloader expects): aurelia_<os>_<arch>[.exe].
#
# Triggers on a pushed v* tag (creates the release); workflow_dispatch just
# builds the artifacts so you can test the matrix without tagging.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            asset: aurelia_linux_x86_64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            asset: aurelia_linux_arm64
          - name: windows-x86_64
            os: windows-latest
            asset: aurelia_windows_x86_64.exe
          - name: windows-arm64
            os: windows-11-arm
            asset: aurelia_windows_arm64.exe
          - name: macos-x86_64
            os: macos-13
            asset: aurelia_macOS_x86_64
          - name: macos-arm64
            os: macos-14
            asset: aurelia_macOS_arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libgtk-3-dev \
            libpulse-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Aurelia (release)
        run: cargo build --release

      - name: Stage binary as release asset
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "target/release/aurelia.exe" "dist/${{ matrix.asset }}"
          else
            cp "target/release/aurelia" "dist/${{ matrix.asset }}"
            chmod +x "dist/${{ matrix.asset }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          archive: false

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    # Only publish for an actual tag; workflow_dispatch runs just build the assets.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create / update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release on first run; on a re-run, just (re)upload the assets.
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Aurelia ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
